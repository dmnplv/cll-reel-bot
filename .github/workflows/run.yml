name: CLL Auto Post
on:
  schedule:
    - cron: '0 9,13,20 * * *' # 10:00, 14:00, 21:00 IT
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install FFmpeg and Deps
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install telethon requests

      - name: Run script
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          IG_BUSINESS_ID: ${{ secrets.IG_BUSINESS_ID }}
          IG_PAGE_TOKEN: ${{ secrets.IG_PAGE_TOKEN }}
        run: python main.py

      - name: Save and Push Progress
        run: |
          git config --global user.name 'CLL-Bot'
          git config --global user.email 'bot@catanialatinlovers.it'
          git add pubblicati.txt ready.mp4 caption.txt || true
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add pubblicati.txt ready.mp4 caption.txt || true
          git commit -m "Update HQ video, caption and database 🌋" || true
          # Se il video è stato postato, lo script lo ha cancellato localmente.
          # Questo comando lo cancella anche dal repository remoto dopo il push.
          git rm ready.mp4 caption.txt --ignore-unmatch || true
          git commit -m "Cleanup posted media" || true
          git push origin main
