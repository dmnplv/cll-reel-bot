name: CLL Auto Post
on:
  schedule:
    - cron: '0 9,13,20 * * *' # Scatta alle 10:00, 14:00, 21:00 italiane (UTC+1)
  workflow_dispatch: # Permette l'avvio manuale per i test

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permesso necessario per salvare i file nel repo
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Scarica tutta la cronologia per evitare errori di push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install FFmpeg and Deps
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install telethon requests

      - name: Run script
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          IG_BUSINESS_ID: ${{ secrets.IG_BUSINESS_ID }}
          IG_PAGE_TOKEN: ${{ secrets.IG_PAGE_TOKEN }}
        run: python main.py

      - name: Save and Push Progress
        run: |
          git config --global user.name 'CLL-Bot'
          git config --global user.email 'bot@catanialatinlovers.it'
          
          # 1. Aggiunta iniziale dei file generati o modificati dallo script
          git add pubblicati.txt ready.mp4 caption.txt || true
          
          # 2. Sincronizzazione sicura per evitare conflitti
          git stash
          git pull --rebase origin main
          git stash pop || true
          
          # 3. Logica di pulizia: se il video è stato postato (quindi cancellato dallo script), 
          # rimuovilo dal repo. Se è nuovo (pronto per il prossimo giro), aggiungilo.
          if [ ! -f ready.mp4 ]; then
            git rm ready.mp4 caption.txt --ignore-unmatch || true
          else
            git add ready.mp4 caption.txt || true
          fi
          
          # 4. Conferma finale del database ID
          git add pubblicati.txt || true
          
          # 5. Commit e Push finale
          git commit -m "Sync video, Catania Geotag and database 🌋" || echo "Nothing to commit"
          git push origin main
