name: CLL Auto Post
on:
  schedule:
    # Gira ogni 2 ore circa negli orari caldi (Mattina, Pomeriggio, Sera)
    # 08:00, 10:00, 13:00, 15:00, 19:00, 21:00 IT (UTC+1)
    - cron: '0 7,9,12,14,18,20 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install FFmpeg and Deps
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install telethon requests

      - name: Run script
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          IG_BUSINESS_ID: ${{ secrets.IG_BUSINESS_ID }}
          IG_PAGE_TOKEN: ${{ secrets.IG_PAGE_TOKEN }}
        run: python main.py

      - name: Save and Push Progress
        run: |
          git config --global user.name 'CLL-Bot'
          git config --global user.email 'bot@catanialatinlovers.it'
          
          # Aggiunta file generati
          git add pubblicati.txt ready.mp4 caption.txt || true
          
          # Sincronizzazione sicura
          git stash
          git pull --rebase origin main
          git stash pop || true
          
          # Se il video è stato postato, lo rimuove. Se è nuovo, lo aggiunge.
          if [ ! -f ready.mp4 ]; then
            git rm ready.mp4 caption.txt --ignore-unmatch || true
          else
            git add ready.mp4 caption.txt || true
          fi
          
          git add pubblicati.txt || true
          git commit -m "Automated update: Sync video and database 🌋" || echo "Nothing to commit"
          git push origin main
