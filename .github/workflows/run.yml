name: CLL Auto Post
on:
  schedule:
    # 10:00, 14:00 e 21:00 (Ora Italiana)
    - cron: '0 9,13,20 * * *' 
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install FFmpeg and Deps
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install telethon requests

      - name: Run Automator Script
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          IG_BUSINESS_ID: ${{ secrets.IG_BUSINESS_ID }}
          IG_PAGE_TOKEN: ${{ secrets.IG_PAGE_TOKEN }}
        run: python main.py

      - name: Save and Push Progress
        run: |
          git config --global user.name 'CLL-Bot'
          git config --global user.email 'bot@catanialatinlovers.it'
          git add pubblicati.txt || true
          git rm ready.mp4 caption.txt || true # Rimuove i file postati dal repo
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add pubblicati.txt || true
          git commit -m "Cleanup and update DB 🌋" || true
          git push origin main
